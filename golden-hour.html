<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="outdoor · golden hour — event coverage.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <a class="menu-pill" href="index.html#work">
      <span class="brackets">[ ]</span>
      <span class="label">portfolio</span>
    </a>
  </nav>

  <main class="gallery-main">
    <div class="proj-head reveal">
      <div>
        <div class="tag">[collection · 03]</div>
        <h1>beauty shoot</h1>
        <div class="sub">personal photoshoot</div>
      </div>
      <a class="back" href="index.html#work">← all work</a>
    </div>

    <section class="album reveal">
      <div class="macwin">
        <div class="macbar">
          <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
          <div class="addr">berkas.com/golden-hour</div>
        </div>
        <div class="album-body">
          <div class="count" id="count"></div>
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </section>

    <div class="next-proj reveal">
      <span class="lbl">[next collection]</span>
      <a href="events.html">outdoor →</a>
    </div>
  </main>

  <footer id="site-footer">
    <div class="wrap">
      <div class="foot-grid">
        <div>
          <div class="tag">[berkas.]</div>
          <div class="foot-title">a quiet<br>photo studio.</div>
        </div>
        <div class="foot-col">
          <div class="tag">[links]</div>
          <a href="index.html#top">home</a>
          <a href="index.html#work">work</a>
          <a href="index.html#contact">contact</a>
        </div>
        <div class="foot-col">
          <div class="tag">[connect]</div>
          <a href="#">instagram</a>
          <a href="#">github</a>
        </div>
      </div>
      <div class="foot-logo">[berkas<span>.</span>]</div>
      <div class="foot-bottom">designed &amp; built by berkas © 2026</div>
    </div>
  </footer>

<script>
  (function () {
    var folder = 'golden-hour';
    var photos = [
      'IMG_4205.JPG', 'IMG_4206.JPG', 'IMG_4207.JPG', 'IMG_4208.JPG',
      'IMG_4209.JPG', 'IMG_4210.JPG', 'IMG_4211.JPG', 'IMG_4212.JPG',
      'IMG_4213.JPG', 'IMG_4214.JPG', 'IMG_4215.JPG', 'IMG_4216.JPG',
      'IMG_4217.JPG', 'IMG_4218.JPG', 'IMG_4219.JPG', 'IMG_4220.JPG',
      'IMG_4221.JPG', 'IMG_4222.JPG', 'jo35.jpeg'
    ];
    var grid = document.getElementById('grid');
    var frag = document.createDocumentFragment();
    photos.forEach(function (name, i) {
      var shot = document.createElement('div');
      shot.className = 'shot';
      var frame = document.createElement('div');
      frame.className = 'frame';
      var img = document.createElement('img');
      img.src = 'images/' + folder + '/' + name;
      img.alt = folder + ' frame ' + (i + 1);
      img.loading = 'lazy';
      frame.appendChild(img);
      shot.appendChild(frame);
      frag.appendChild(shot);
    });
    grid.appendChild(frag);
    document.getElementById('count').textContent = photos.length + ' frames';
  })();
</script>
<script src="app.js"></script>
</body>
</html>
